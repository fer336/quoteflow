version: "3.8"

# ==============================================================================
# QuoteFlow - Docker Compose (Producción)
# ==============================================================================
# Usar con Portainer + Swarm + Traefik
# Requiere: secreto budgetpro_backend_env_v2 pre-configurado en el manager

services:
  backend:
    image: ghcr.io/fer336/quoteflow/backend:latest
    networks:
      - network_public
      - budgetpro-internal
    secrets:
      - source: budgetpro_backend_env_v2
        target: /run/secrets/backend.env
    environment:
      - DATABASE_URL_FILE=/run/secrets/backend.env
      - GOOGLE_CLIENT_ID_FILE=/run/secrets/backend.env
      - CORS_ORIGINS=https://login-flow.octopustrack.shop,http://login-flow.octopustrack.shop,https://cms-flow.octopustrack.shop,http://cms-flow.octopustrack.shop
    volumes:
      - budgetpro_static:/app/static
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.quoteflow-api.rule=(Host(`login-flow.octopustrack.shop`) || Host(`cms-flow.octopustrack.shop`)) && PathPrefix(`/api`)"
        - "traefik.http.routers.quoteflow-api.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.quoteflow-backend.loadbalancer.server.port=8000"
        - "traefik.http.routers.quoteflow-static.rule=(Host(`login-flow.octopustrack.shop`) || Host(`cms-flow.octopustrack.shop`)) && PathPrefix(`/static`)"
        - "traefik.http.routers.quoteflow-static.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-static.tls.certresolver=letsencryptresolver"

  frontend:
    image: ghcr.io/fer336/quoteflow/frontend:latest
    networks:
      - network_public
      - budgetpro-internal
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.quoteflow-frontend.rule=Host(`login-flow.octopustrack.shop`)"
        - "traefik.http.routers.quoteflow-frontend.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.quoteflow-frontend.loadbalancer.server.port=80"

  frontend-cms:
    image: ghcr.io/fer336/quoteflow/frontend-cms:latest
    networks:
      - network_public
      - budgetpro-internal
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.quoteflow-cms.rule=Host(`cms-flow.octopustrack.shop`)"
        - "traefik.http.routers.quoteflow-cms.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-cms.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.quoteflow-cms.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
    name: network_public
  budgetpro-internal:
    driver: overlay
    internal: true

volumes:
  budgetpro_static:
    driver: local

secrets:
  budgetpro_backend_env_v2:
    external: true
