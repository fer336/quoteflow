version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: budgetpro_db
    environment:
      POSTGRES_DB: budgetpro_db
      POSTGRES_USER: budgetpro_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budgetpro_pass_2025}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budgetpro_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetpro_user -d budgetpro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgetpro_backend
    environment:
      DATABASE_URL: postgresql://budgetpro_user:${DB_PASSWORD:-budgetpro_pass_2025}@postgres:5432/budgetpro_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,https://finanzas.qeva.xyz
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budgetpro_network
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: budgetpro_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - budgetpro_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
    driver: local

networks:
  budgetpro_network:
    driver: bridge

