version: "3.8"

services:
  backend:
    image: ferc33/budgetpro-backend:latest
    networks:
      - network_public
      - budgetpro-internal
    secrets:
      - source: budgetpro_backend_env_v2
        target: /run/secrets/backend.env
    environment:
      - DATABASE_URL_FILE=/run/secrets/backend.env
      - GOOGLE_CLIENT_ID_FILE=/run/secrets/backend.env
      - CORS_ORIGINS=https://sistema.qeva.xyz,http://sistema.qeva.xyz
    volumes:
      - budgetpro_static:/app/static
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.budgetpro-api.rule=Host(`sistema.qeva.xyz`) && PathPrefix(`/api`)"
        - "traefik.http.routers.budgetpro-api.entrypoints=websecure"
        - "traefik.http.routers.budgetpro-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.budgetpro-backend.loadbalancer.server.port=8000"
        - "traefik.http.routers.budgetpro-static.rule=Host(`sistema.qeva.xyz`) && PathPrefix(`/static`)"
        - "traefik.http.routers.budgetpro-static.entrypoints=websecure"
        - "traefik.http.routers.budgetpro-static.tls.certresolver=letsencryptresolver"

  frontend:
    image: ferc33/budgetpro-frontend:latest
    networks:
      - network_public
      - budgetpro-internal
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.budgetpro-frontend.rule=Host(`sistema.qeva.xyz`)"
        - "traefik.http.routers.budgetpro-frontend.entrypoints=websecure"
        - "traefik.http.routers.budgetpro-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.budgetpro-frontend.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
    name: network_public
  budgetpro-internal:
    driver: overlay
    internal: true

volumes:
  budgetpro_static:
    driver: local

secrets:
  budgetpro_backend_env_v2:
    external: true