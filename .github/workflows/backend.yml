name: Backend CI/CD

on:
  push:
    branches:
      - main
      - testing
      - marinkovic
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'docker-compose.portainer.yml'
      - '.github/workflows/backend.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Display image tags
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

      - name: Notify Portainer
        if: vars.PORTAINER_WEBHOOK_URL && github.ref_name == 'main'
        run: |
          echo "Notifying Portainer..."
          curl -X POST "${{ vars.PORTAINER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref_name }}", "commit": "${{ github.sha }}", "tag": "${{ steps.meta.outputs.tags }}"}'
        continue-on-error: true

      - name: Notify Portainer Testing
        if: vars.PORTAINER_WEBHOOK_URL_TESTING && github.ref_name == 'testing'
        run: |
          echo "Notifying Portainer testing..."
          curl -X POST "${{ vars.PORTAINER_WEBHOOK_URL_TESTING }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref_name }}", "commit": "${{ github.sha }}", "tag": "${{ steps.meta.outputs.tags }}"}'
        continue-on-error: true

      - name: Notify Portainer Marinkovic
        if: vars.PORTAINER_WEBHOOK_URL_MARINKOVIC && github.ref_name == 'marinkovic'
        run: |
          echo "Notifying Portainer marinkovic..."
          curl -X POST "${{ vars.PORTAINER_WEBHOOK_URL_MARINKOVIC }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref_name }}", "commit": "${{ github.sha }}", "tag": "${{ steps.meta.outputs.tags }}"}'
        continue-on-error: true
