version: "3.8"

# ==============================================================================
# QuoteFlow - Stack File para Portainer
# ==============================================================================
# Versión de testing que usa imagenes con tag "testing"
# Para producción, cambiar "testing" por "latest" o "vX.Y.Z"

services:
  backend:
    image: ghcr.io/fer336/quoteflow/backend:testing
    networks:
      - network_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://presupuestos.octopustrack.shop,http://presupuestos.octopustrack.shop}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio.qeva.xyz}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-budgetpro-logos}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
    volumes:
      - budgetpro_static:/app/static
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.quoteflow-api.rule=Host(`presupuestos.octopustrack.shop`) && PathPrefix(`/api`)"
        - "traefik.http.routers.quoteflow-api.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.quoteflow-backend.loadbalancer.server.port=8000"
        - "traefik.http.routers.quoteflow-static.rule=Host(`presupuestos.octopustrack.shop`) && PathPrefix(`/static`)"
        - "traefik.http.routers.quoteflow-static.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-static.tls.certresolver=letsencryptresolver"

  frontend:
    image: ghcr.io/fer336/quoteflow/frontend:testing
    networks:
      - network_public
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.quoteflow-frontend.rule=Host(`presupuestos.octopustrack.shop`)"
        - "traefik.http.routers.quoteflow-frontend.entrypoints=websecure"
        - "traefik.http.routers.quoteflow-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.quoteflow-frontend.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
    name: network_public

volumes:
  budgetpro_static:
    driver: local